services:
  backend:
    image: wb-erp-backend:latest
    container_name: wb-erp-backend
    ports:
      - "8000:8000"
    volumes:
      - /opt/wb-erp/backend:/app/backend
      - wb-erp-db:/app/db
    working_dir: /app/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - APP_ENV=production
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    networks:
      - wb-erp_wb-erp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: wb-erp-frontend:latest
    container_name: wb-erp-frontend
    ports:
      - "8080:80"
    volumes:
      - /opt/wb-erp/frontend/dist:/usr/share/nginx/html:ro
      - /opt/wb-erp/static:/opt/wb-erp/static:ro
      - /tmp/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - wb-erp_wb-erp-network

volumes:
  wb-erp-db:
    name: wb-erp-db
    external: true

networks:
  wb-erp_wb-erp-network:
    external: true
