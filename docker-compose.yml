services:
  mysql:
    image: mysql:8.4
    container_name: wb-erp-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-wb_erp_shadow}
      - MYSQL_USER=${MYSQL_USER:-wb_erp_shadow}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TZ=Asia/Shanghai
    volumes:
      - wb-erp-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - wb-erp_wb-erp-network

  backend:
    image: wb-erp-backend:latest
    container_name: wb-erp-backend
    ports:
      - "8000:8000"
    volumes:
      - /opt/wb-erp/backend:/app/backend
      - wb-erp-db:/app/db
    working_dir: /app/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - APP_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - SYNC_ENABLED=${SYNC_ENABLED:-false}
    networks:
      - wb-erp_wb-erp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: wb-erp-frontend:latest
    container_name: wb-erp-frontend
    ports:
      - "8080:80"
    volumes:
      - /opt/wb-erp/frontend/dist:/usr/share/nginx/html:ro
      - /opt/wb-erp/static:/opt/wb-erp/static:ro
      - /opt/wb-erp/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - wb-erp_wb-erp-network

volumes:
  wb-erp-db:
    name: wb-erp-db
    external: true
  wb-erp-mysql-data:
    name: wb-erp-mysql-data

networks:
  wb-erp_wb-erp-network:
    external: true
