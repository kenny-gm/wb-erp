<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合肥拓图俄罗斯销售分析系统</title>
  <link rel="icon" type="image/png" href="/api/admin/favicon/">
  <script>
    // 从 localStorage 快速恢复缓存（不阻塞）
    (function() {
      try {
        var cached = localStorage.getItem('ui_settings_cache');
        if (cached) {
          var data = JSON.parse(cached);
          if (data.system_name) document.title = data.system_name;
        }
      } catch(e) {}
      // 异步拉取最新配置更新缓存
      fetch('/api/admin/ui-settings/').then(function(r) {
        if (r.ok) return r.json();
      }).then(function(data) {
        if (data) {
          localStorage.setItem('ui_settings_cache', JSON.stringify(data));
          if (data.system_name) document.title = data.system_name;
          // 通知 Vue 应用配置已更新
          window.dispatchEvent(new CustomEvent('ui-settings-updated', { detail: data }));
        }
      }).catch(function() {});
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
